<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBH 宝箱マルチタイマー</title>
    <style>
        :root { 
            --card-width: 280px; 
            --card-height: 350px;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #1a1a2e; color: #ffffff; text-align: center; margin: 30px 20px; }
        h1 { color: #fca311; }
        
        .global-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 20px 0 30px 0; flex-wrap: wrap; }
        #add-btn { font-size: 1.1rem; background-color: #2a9d8f; color: white; padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; }
        #add-btn:hover { background-color: #264653; }
        
        .control-panel { display: flex; align-items: center; background-color: #16213e; padding: 8px 16px; border-radius: 8px; border: 1px solid #0f3460; gap: 15px; flex-wrap: wrap; }
        .control-group { display: flex; align-items: center; gap: 5px; font-size: 0.9rem; }
        #volume-slider { cursor: pointer; accent-color: #fca311; width: 80px; }
        .num-input { width: 50px; background: #0f3460; border: 1px solid #4a5568; color: white; border-radius: 4px; padding: 4px; text-align: center; }
        
        #test-btn, #notification-btn { background-color: #fca311; color: #1a1a2e; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.85rem; }
        #notification-btn { background-color: #3a86ff; color: white; }
        
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        
        /* カード全体。サイズ変動に合わせて中身が縮小するように設定 */
        .timer-card { 
            background-color: #16213e; 
            border: 3px double #fca311; 
            border-radius: 15px; 
            padding: clamp(10px, 2vw, 20px); 
            width: var(--card-width); 
            min-height: var(--card-height);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 0 15px rgba(0,0,0,0.3); 
            transition: border-color 0.3s, box-shadow 0.3s; 
        }
        .timer-card.finished { border-color: #e63946 !important; animation: blink-alert 0.8s infinite; }
        @keyframes blink-alert {
            0%, 100% { border-color: #e63946; box-shadow: 0 0 10px #e63946; }
            50% { border-color: #ffffff; box-shadow: 0 0 30px #ffffff; }
        }

        .stage-selector-container { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px; text-align: left; }
        .select-group span { font-size: clamp(0.6rem, 1vw, 0.75rem); color: #a0aec0; font-weight: bold; display: block; }
        .stage-select { background-color: #0f3460; border: 1px solid #4a5568; color: #ffffff; padding: 4px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: clamp(0.7rem, 1vw, 0.9rem); }
        
        .timer-display { font-size: clamp(1.5rem, 5vw, 3rem); font-weight: bold; margin: 5px 0; font-variant-numeric: tabular-nums; }
        .progress-container { background-color: #0f3460; border-radius: 6px; overflow: hidden; margin: 5px auto 10px auto; width: 90%; height: clamp(10px, 2vh, 16px); position: relative; }
        .progress-bar { background-color: #2a9d8f; width: 0%; height: 100%; transition: width 0.2s linear; }
        .progress-text { position: absolute; width: 100%; height: 100%; top: 0; left: 0; font-size: clamp(0.5rem, 1vw, 0.75rem); line-height: clamp(10px, 2vh, 16px); font-weight: bold; color: #ffffff; }
        
        .controls { display: flex; justify-content: center; gap: 4px; margin-top: auto; }
        .controls button { font-size: clamp(0.7rem, 1vw, 0.85rem); padding: 6px 8px; border: none; border-radius: 6px; cursor: pointer; }
        .start-btn { background-color: #e63946; color: white; flex-grow: 1; }
        .start-btn:disabled { background-color: #4a5568; cursor: not-allowed; }
        .reset-btn { background-color: #457b9d; color: white; }
        .delete-btn { background-color: #6c757d; color: white; }
        
        .settings { margin-top: 10px; font-size: clamp(0.7rem, 1vw, 0.9rem); color: #a0aec0; }
        .settings input { width: 40px; background: #0f3460; border: 1px solid #4a5568; color: white; border-radius: 4px; padding: 2px; text-align: center; }
    </style>
</head>
<body>

    <h1>TBH 宝箱マルチタイマー</h1>

    <div class="global-controls">
        <button id="add-btn" onclick="addTimer(12)">+ タイマーを追加</button>
        <div class="control-panel">
            <div class="control-group">
                <label>幅: <input type="number" id="card-width-input" class="num-input" value="280" min="200" max="600" onchange="updateCardSize()"></label>
            </div>
            <div class="control-group">
                <label>縦: <input type="number" id="card-height-input" class="num-input" value="350" min="250" max="600" onchange="updateCardSize()"></label>
            </div>
            <div class="control-group">
                <label for="volume-slider">🔊</label>
                <input type="range" id="volume-slider" min="0" max="100" value="50">
            </div>
            <button id="test-btn" onclick="playNotificationSound()">テスト</button>
            <button id="notification-btn" onclick="requestNotificationPermission()">通知許可</button>
        </div>
    </div>

    <div id="timers-container" class="container"></div>

    <script>
        let timers = [];
        let nextId = 0;
        let globalTickInterval = null;
        const stageNumbers = [];
        const diffColors = { "ノーマル": "#2a9d8f", "ナイトメア": "#3a86ff", "ヘル": "#9d4edd", "トーメント": "#ff0054" };
        for (let g = 1; g <= 3; g++) { for (let n = 1; n <= 9; n++) stageNumbers.push(`${g}-${n}`); }

        function initApp() {
            // サイズ設定の読み込み
            const savedWidth = localStorage.getItem('tbh_card_width') || '280';
            const savedHeight = localStorage.getItem('tbh_card_height') || '350';
            
            document.getElementById('card-width-input').value = savedWidth;
            document.getElementById('card-height-input').value = savedHeight;
            applyCardSize(savedWidth, savedHeight);

            loadTimers();
            globalTickInterval = setInterval(updateAllTimers, 100);
        }

        function updateCardSize() {
            const w = document.getElementById('card-width-input').value;
            const h = document.getElementById('card-height-input').value;
            applyCardSize(w, h);
            localStorage.setItem('tbh_card_width', w);
            localStorage.setItem('tbh_card_height', h);
        }

        function applyCardSize(w, h) {
            document.documentElement.style.setProperty('--card-width', w + 'px');
            document.documentElement.style.setProperty('--card-height', h + 'px');
        }

        function updateAllTimers() {
            let minTimeRemaining = Infinity;
            let activeCount = 0;

            timers.forEach(timer => {
                if (timer.isRunning) {
                    const now = Date.now();
                    const remaining = Math.max(0, timer.endTime - now);
                    
                    if (remaining > 0) {
                        updateCardDisplay(timer, remaining);
                        if (remaining < minTimeRemaining) minTimeRemaining = remaining;
                        activeCount++;
                    } else {
                        timer.isRunning = false;
                        timer.endTime = null;
                        finishTimer(timer);
                    }
                }
            });

            if (activeCount > 0) {
                const m = Math.floor(minTimeRemaining / 60000).toString().padStart(2, '0');
                const s = Math.floor((minTimeRemaining % 60000) / 1000).toString().padStart(2, '0');
                document.title = `${m}:${s} - TBHタイマー`;
            } else {
                document.title = "TBH 宝箱マルチタイマー";
            }
        }

        function finishTimer(timer) {
            const card = document.getElementById(`timer-${timer.id}`);
            if (card) {
                card.classList.add('finished');
                card.querySelector('.start-btn').disabled = false;
                card.querySelector('.timer-display').textContent = "00:00";
                card.querySelector('.progress-bar').style.width = `100%`;
                card.querySelector('.progress-text').textContent = `100%`;
            }
            playNotificationSound();
            sendOSNotification("宝箱ドロップ！", `${timer.difficulty} ${timer.stageNum} の宝箱がドロップしました！`);
            
            timer.finishedTimeout = setTimeout(() => {
                resetTimer(timer.id);
            }, 60000);
        }

        function requestNotificationPermission() {
            if (!("Notification" in window)) return alert("このブラウザはOS通知に対応していません。");
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') alert("通知を有効にしました！");
            });
        }

        function sendOSNotification(title, body) {
            if (Notification.permission === 'granted') {
                new Notification(title, { body });
            }
        }

        function playNotificationSound() {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) return;
            const audioCtx = new AudioContextClass();
            const volumeSlider = document.getElementById('volume-slider');
            const targetGain = (volumeSlider ? parseInt(volumeSlider.value) : 50) / 100 * 0.3;
            const now = audioCtx.currentTime;
            
            [0, 0.15, 0.3].forEach(delay => {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, now + delay);
                gainNode.gain.setValueAtTime(targetGain, now + delay);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, now + delay + 0.08);
                osc.connect(gainNode); gainNode.connect(audioCtx.destination);
                osc.start(now + delay); osc.stop(now + delay + 0.09);
            });
        }

        function addTimer(defaultMinutes = 12, diff = 'ノーマル', stage = '1-1', shouldSave = true) {
            const id = nextId++;
            timers.push({ id, endTime: null, isRunning: false, initialMinutes: defaultMinutes, difficulty: diff, stageNum: stage, finishedTimeout: null });
            renderTimers();
            if (shouldSave) saveTimers();
        }

        function updateInterval(id, newMinutes) {
            const timer = timers.find(t => t.id === id);
            if (!timer) return;
            timer.initialMinutes = parseInt(newMinutes) || 1;
            resetTimer(id);
            saveTimers();
        }

        function toggleTimer(id) {
            const timer = timers.find(t => t.id === id);
            if (!timer || timer.isRunning) return;
            
            const card = document.getElementById(`timer-${id}`);
            timer.isRunning = true;
            timer.endTime = Date.now() + (timer.initialMinutes * 60 * 1000);
            
            card.classList.remove('finished');
            card.querySelector('.start-btn').disabled = true;
        }

        function resetTimer(id) {
            const timer = timers.find(t => t.id === id);
            if (!timer) return;
            
            if (timer.finishedTimeout) {
                clearTimeout(timer.finishedTimeout);
                timer.finishedTimeout = null;
            }
            
            timer.isRunning = false;
            timer.endTime = null;
            
            const card = document.getElementById(`timer-${id}`);
            if (card) {
                card.classList.remove('finished');
                card.querySelector('.start-btn').disabled = false;
                card.querySelector('.timer-display').textContent = `${timer.initialMinutes.toString().padStart(2, '0')}:00`;
                card.querySelector('.progress-bar').style.width = `0%`;
                card.querySelector('.progress-text').textContent = `0%`;
                card.style.borderColor = diffColors[timer.difficulty];
            }
            saveTimers();
        }

        function updateCardDisplay(timer, remaining) {
            const card = document.getElementById(`timer-${timer.id}`);
            if (!card) return;
            const m = Math.floor(remaining / 60000).toString().padStart(2, '0');
            const s = Math.floor((remaining % 60000) / 1000).toString().padStart(2, '0');
            card.querySelector('.timer-display').textContent = `${m}:${s}`;
            const total = timer.initialMinutes * 60 * 1000;
            const progress = total > 0 ? Math.min(100, Math.round(((total - remaining) / total) * 100)) : 0;
            card.querySelector('.progress-bar').style.width = `${progress}%`;
            card.querySelector('.progress-text').textContent = `${progress}%`;
        }

        function renderTimers() {
            const container = document.getElementById('timers-container');
            timers.forEach(timer => {
                if (document.getElementById(`timer-${timer.id}`)) return;
                const card = document.createElement('div');
                card.className = 'timer-card';
                card.id = `timer-${timer.id}`;
                card.style.borderColor = diffColors[timer.difficulty];
                card.innerHTML = `
                    <div class="stage-selector-container">
                        <div class="select-group"><span>難易度</span><select class="stage-select diff-select" onchange="updateStageName(${timer.id})">
                            ${Object.keys(diffColors).map(d => `<option ${timer.difficulty===d?'selected':''}>${d}</option>`).join('')}
                        </select></div>
                        <div class="select-group"><span>ステージ</span><select class="stage-select num-select" onchange="updateStageName(${timer.id})">${stageNumbers.map(n=>`<option ${timer.stageNum===n?'selected':''}>${n}</option>`).join('')}</select></div>
                    </div>
                    <div class="timer-display">${timer.initialMinutes.toString().padStart(2, '0')}:00</div>
                    <div class="progress-container"><div class="progress-bar"></div><div class="progress-text">0%</div></div>
                    <div class="controls">
                        <button class="start-btn" onclick="toggleTimer(${timer.id})">青箱がドロップ！</button>
                        <button class="reset-btn" onclick="resetTimer(${timer.id})">リセット</button>
                        <button class="delete-btn" onclick="removeTimer(${timer.id})">削除</button>
                    </div>
                    <div class="settings">
                        間隔(分): <input type="number" value="${timer.initialMinutes}" min="1" onchange="updateInterval(${timer.id}, this.value)">
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function saveTimers() { localStorage.setItem('tbh_timers_data', JSON.stringify(timers)); }
        function loadTimers() { 
            const data = localStorage.getItem('tbh_timers_data'); 
            if(data) { 
                timers = JSON.parse(data); 
                timers.forEach((t, index) => { t.id = index; t.isRunning = false; t.endTime = null; });
                nextId = timers.length;
                renderTimers(); 
            } else { addTimer(12); } 
        }
        function updateStageName(id) { 
            const timer = timers.find(t=>t.id===id); 
            const card = document.getElementById(`timer-${id}`); 
            timer.difficulty = card.querySelector('.diff-select').value; 
            timer.stageNum = card.querySelector('.num-select').value; 
            card.style.borderColor = diffColors[timer.difficulty];
            saveTimers(); 
        }
        function removeTimer(id) { 
            const timer = timers.find(t => t.id === id);
            if(timer && timer.finishedTimeout) clearTimeout(timer.finishedTimeout);
            timers = timers.filter(t=>t.id!==id); 
            document.getElementById(`timer-${id}`)?.remove(); 
            saveTimers(); 
        }
        
        window.onload = initApp;
    </script>
</body>
</html>
